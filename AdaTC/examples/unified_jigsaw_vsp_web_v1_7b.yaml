### model
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
# image_resolution: 262144
# video_resolution: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true  # choices: [true, false]
freeze_multi_modal_projector: true  # choices: [true, false]
# train_mm_proj_only: false  # choices: [true, false]
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json,ds_z3_offload_config.json ]

### dataset
dataset: unified_jigsaw_vsp_web_v1
template: qwen2_vl
cutoff_len: 35536
max_samples: 332649
overwrite_cache: true
preprocessing_num_workers: 64

### output
output_dir: /your/output/dir/Qwen2.5-VL-7B-Instruct-unified_jigsaw_vsp_web_v1
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100

## wandb
report_to: wandb
run_name: Qwen2.5-VL-7B-Instruct-unified_jigsaw_vsp_web_v1
# wandb_project: r1_p

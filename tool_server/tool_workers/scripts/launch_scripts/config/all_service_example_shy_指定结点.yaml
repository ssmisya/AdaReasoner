  - Crop:
      worker_name: Crop
      job_name: crop
      calculate_type: control
      cmd:
        script-addr: tool_server.tool_workers.online_workers.crop_worker_prompt
        port: 20040
        host: "0.0.0.0"

  - OCR:
      worker_name: OCR
      job_name: ocr
      calculate_type: calculate
      node_list: "SH-IDC1-10-140-37-24"
      cuda_visible_devices: "0,1,4,5"
      use_apptainer: true
      apptainer_image: "/mnt/petrelfs/sunhaoyu/visual-code/tool-server.sif"
      cmd:
        script-addr: tool_server.tool_workers.online_workers.ocr_worker
        port: 20009
        host: "0.0.0.0"
        gpu_ids: "0,1,4,5"  # 指定使用的GPU ID
        enable_multi_gpu: true  # 启用多GPU推理
        max_concurrency: 5  # 增加并发数以支持多GPU


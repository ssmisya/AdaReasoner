# base_dir: ../..
# log_folder: ../../logs/server_log
base_dir: /mnt/petrelfs/sunhaoyu/visual-code/Tool-Factory-Filter/tool_server/tool_workers
log_folder: /mnt/petrelfs/sunhaoyu/visual-code/Tool-Factory-Filter/tool_server/tool_workers/logs/server_log
partition: "ai_moe2"
default_calculate_gpus: 1
default_calculate_cpus: 12
default_control_cpus: 2
default_control_gpus: 0
retry_interval: 1
request_timeout: 10

controller_config:
  worker_name: controller
  job_name: controller
  calculate_type: control
  srun_kwargs:
    w: "SH-IDC1-10-140-37-24"  # 指定固定节点
  cmd:
    script-addr: ./online_workers/controller.py
    port: 21112
    host: "0.0.0.0"

# 所有的参数名称都会转义成下划线的形式
# 比如model-path会转义成model_path

